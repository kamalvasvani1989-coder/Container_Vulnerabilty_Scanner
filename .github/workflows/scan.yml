name: Container Image Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Build image
        run: docker build -t vuln-scanner-test:ci .

      # Produce a JSON report file for the artifact. This is separate
      # from the gate decision below — its only job is to leave a
      # downloadable record. It does not fail the build on findings.
      - name: Generate scan report
        run: trivy image --format json --output trivy-report.json --quiet vuln-scanner-test:ci

      # Upload the report. `if: always()` ensures it runs even when the
      # gate step below fails — we want the report most on a failure.
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-report.json

      # The gate. Exit 1 (policy fail) or 2 (tool error) fails the build.
      - name: Run vulnerability scan
        run: python scanner.py vuln-scanner-test:ci